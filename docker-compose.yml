services:
  # ===========================
  # ZOOKEEPER (Kafka dependency)
  # ===========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ===========================
  # KAFKA
  # ===========================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST dùng cho host machine (nếu cần debug từ ngoài Docker)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"   # expose ra host để debug nếu cần
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  # ===========================
  # MYSQL
  # ===========================
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  # ===========================
  # AUTH SERVICE
  # ===========================
  auth-service:
    build: ./services/auth-service
    restart: always
    env_file:
      - ./services/auth-service/.env.dev
    command: sh -c "npx knex migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # TRANSACTION SERVICE
  # ===========================
  transaction-service:
    build: ./services/transaction-service
    restart: always
    env_file:
      - ./services/transaction-service/.env.dev
    command: sh -c "npm run migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # SAVING SERVICE
  # ===========================
  saving-service:
    build: ./services/saving-service
    restart: always
    env_file:
      - ./services/saving-service/.env.dev
    command: sh -c "npx knex migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # NOTIFICATION SERVICE
  # ===========================
  notification-service:
    build: ./services/notification-service
    restart: always
    env_file:
      - ./services/notification-service/.env.dev
    command: sh -c "npx knex migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # GROUP SERVICE
  # ===========================
  group-service:
    build: ./services/group-service
    restart: always
    env_file:
      - ./services/group-service/.env.dev
    command: sh -c "npm run migrate:latest && node server.js"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # API GATEWAY
  # ===========================
  gateway:
    build: ./gateway
    restart: always
    env_file:
      - ./gateway/.env
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      saving-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ===========================
  # FRONTEND
  # ===========================
  frontend:
    build:
      context: ./frontend
      args:
        # Local: gọi gateway qua localhost (browser không ở trong Docker network)
        REACT_APP_API_BASE_URL: http://localhost:${GATEWAY_PORT:-8080}/api
        REACT_APP_GATEWAY_URL: http://localhost:${GATEWAY_PORT:-8080}
    restart: always
    ports:
      - "${FRONTEND_PORT:-5000}:3000"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
